name: Deploy to VM

on:
  push:
    branches:
      - main          # auto-deploy on every push to main
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy NewsCollectorAgent
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Configure SSH ──────────────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts 2>/dev/null

      # ── 2. Write .env from secrets then deploy ────────────────────────────
      - name: Write .env to VM
        env:
          S_USER: ${{ secrets.SERVER_USER || secrets.USERNAME }}
          S_IP: ${{ secrets.SERVER_IP }}
        run: |
          # Construct destination: user@ip or just ip if user is empty
          DEST="$S_IP"
          if [ -n "$S_USER" ]; then DEST="${S_USER}@${S_IP}"; fi
          
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "$DEST" \
              "sudo mkdir -p /opt/news-collector && sudo chown \$USER:\$USER /opt/news-collector && cat > /opt/news-collector/.env" << 'EOF'
          POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT=5432
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE=disable
          COLLECT_INTERVAL_MINUTES=15
          REQUEST_DELAY_SECONDS=1.5
          RETENTION_DAYS=90
          RUN_ONCE=false
          LOG_LEVEL=INFO
          EOF

      # ── 3. Deploy on VM ───────────────────────────────────────────────────
      - name: Deploy on VM
        env:
          S_USER: ${{ secrets.SERVER_USER || secrets.USERNAME }}
          S_IP: ${{ secrets.SERVER_IP }}
        run: |
          DEST="$S_IP"
          if [ -n "$S_USER" ]; then DEST="${S_USER}@${S_IP}"; fi

          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "$DEST" \
              'bash -s' << 'ENDSSH'

            set -euo pipefail
            APP_DIR="/opt/news-collector"

            echo "──────────────────────────────────────────"
            echo "  NewsCollectorAgent — starting deployment"
            echo "──────────────────────────────────────────"

            # ── Clone repo on first deploy, pull on subsequent runs ────────
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "[1/4] First deploy — cloning repository"
              sudo git clone https://github.com/Deepjyoti7147/NewsCollectorAgent.git "$APP_DIR"
              sudo chown -R "$USER:$USER" "$APP_DIR"
            else
              echo "[1/4] Pulling latest code"
              git -C "$APP_DIR" fetch origin main
              git -C "$APP_DIR" reset --hard origin/main
            fi

            # ── Verify .env (was written in previous step) ─────────────────
            echo "[2/4] Verifying .env"
            if [ ! -f "$APP_DIR/.env" ]; then
              echo "ERROR: .env missing — secrets step may have failed."
              exit 1
            fi

            # ── Rebuild Docker image and restart ──────────────────────────
            echo "[3/4] Building Docker image"
            cd "$APP_DIR"
            sudo docker compose build --no-cache

            echo "[4/4] Restarting service"
            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d

            # ── Health check ──────────────────────────────────────────────
            echo "Waiting 10s for container to start..."
            sleep 10
            if sudo docker compose ps | grep -q "Up"; then
              echo "✅ Container is running"
              sudo docker compose logs --tail=30
            else
              echo "❌ Container failed to start — last logs:"
              sudo docker compose logs --tail=50
              exit 1
            fi

            echo "──────────────────────────────────────────"
            echo "  Deployment complete ✅"
            echo "──────────────────────────────────────────"
          ENDSSH

      # ── 4. Cleanup local SSH key ──────────────────────────────────────────
      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
